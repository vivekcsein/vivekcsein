<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Vivek Verma | Software Engineer</title>

    <meta
      name="description"
      content="Vivek Verma (@vivekcsein) — Software Engineer building thoughtful software, developer tools, design systems, and AI-powered experiences."
    />

    <meta name="author" content="Vivek Verma" />

    <style>
      :root {
        --background: #0f0f14;
        --foreground: #ffffff;
        --muted: #a1a1aa;
        --border: #27272a;
        --primary: #8b5cf6;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: var(--background);
        color: var(--foreground);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        max-width: 700px;
        text-align: center;
      }

      .handle {
        color: var(--primary);
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: clamp(2.5rem, 7vw, 5rem);
        line-height: 1;
        margin-bottom: 1rem;
      }

      p {
        color: var(--muted);
        line-height: 1.8;
        font-size: 1.1rem;
        margin-bottom: 2rem;
      }

      .tagline {
        font-size: 1.25rem;
        margin-bottom: 2rem;
        color: #d4d4d8;
      }

      .links {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .links a {
        color: white;
        text-decoration: none;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        transition: 0.2s ease;
      }

      .links a:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
      }

      footer {
        margin-top: 3rem;
        color: var(--muted);
        font-size: 0.875rem;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <div class="handle">@vivekcsein</div>

      <h1>Vivek Verma</h1>

      <div class="tagline">Software Engineer</div>

      <p>
        Building thoughtful software, developer tools, design systems, AI-powered workflows, and
        modern web experiences.
      </p>

      <div class="links">
        <a href="https://github.com/vivekcsein" target="_blank"> GitHub </a>

        <a href="https://www.linkedin.com/in/vivekcsein" target="_blank">LinkedIn</a>
      </div>

      <footer>
        Portfolio currently under construction.
        <br />
        Building something better.
      </footer>
    </main>
  </body>
</html>
